---
name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-ebpf:
    name: Build eBPF
    runs-on: ubuntu-latest
    container:
      image: rust:latest
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Install nightly + rust-src
        run: |
          rustup toolchain install nightly
          rustup component add rust-src --toolchain nightly

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Build eBPF programs
        run: |
          cd jail-ai-ebpf
          cargo +nightly build --release --target=bpfel-unknown-none -Z build-std=core

      - name: Upload eBPF artifact
        uses: https://data.forgejo.org/actions/upload-artifact@v4
        with:
          name: ebpf-programs
          path: target/bpfel-unknown-none/release/jail-ai-ebpf
          retention-days: 1

  build:
    name: Build & Test
    needs: build-ebpf
    runs-on: ubuntu-latest
    container:
      image: rust:latest
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Download eBPF artifact
        uses: https://data.forgejo.org/actions/download-artifact@v4
        with:
          name: ebpf-programs
          path: target/bpfel-unknown-none/release/

      - name: Build eBPF loader
        run: cargo build --verbose --package jail-ai-ebpf-loader

      - name: Build
        run: cargo build --verbose

      - name: Tests
        run: cargo test --verbose

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
